<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天吃什么 · 摇一摇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 6px 12px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
            padding: 40px 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #1d1c1f;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .subhead {
            font-size: 1.1rem;
            color: #6e6d73;
            margin-bottom: 40px;
            font-weight: 400;
        }

        button {
            background: #007aff;
            border: none;
            color: white;
            font-size: 1.4rem;
            font-weight: 500;
            padding: 16px 32px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0, 122, 255, 0.3);
            transition: all 0.2s ease;
            width: 100%;
            max-width: 280px;
            margin: 0 auto 30px;
            display: block;
            outline: none;

            /* ✅ 解决双击放大问题 */
            touch-action: manipulation;
            /* 去掉移动端点击默认灰色背景 */
            -webkit-tap-highlight-color: transparent;
        }

        button:hover {
            background: #005fc7;
            transform: scale(1.02);
            box-shadow: 0 12px 24px rgba(0, 122, 255, 0.4);
        }

        button:active {
            transform: scale(0.98);
            background: #004999;
            box-shadow: 0 4px 8px rgba(0, 122, 255, 0.3);
        }

        .result-box {
            background: white;
            border-radius: 24px;
            padding: 30px 20px;
            margin-top: 20px;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02), 0 4px 12px rgba(0, 0, 0, 0.05);
            border: 1px solid #f0f0f3;
        }

        #result {
            font-size: 2.4rem;
            font-weight: 600;
            color: #1d1c1f;
            line-height: 1.3;
            word-break: break-word;
        }

        .placeholder {
            color: #a1a0a5;
            font-size: 1.8rem;
            font-weight: 400;
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #8e8e93;
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 2.4rem;
            }
            #result {
                font-size: 2rem;
            }
            button {
                font-size: 1.2rem;
                padding: 14px 24px;
                max-width: 240px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>
            <span>🍱</span> 今天吃什么
        </h1>
        <div class="subhead">摇一摇，让手机帮你决定</div>

        <button id="shakeBtn" onclick="pickFood()">摇一摇 👆</button>

        <div class="result-box">
            <div id="result" class="placeholder">等待你的选择…</div>
        </div>

        <div class="footer-note">
            每次点击随机推荐一种美食
        </div>
    </div>

    <script>
        function pickFood() {
            const options = ["沙县小吃", "兰州拉面", "麦当劳", "煲仔饭", "麻辣烫", "肯德基", "日式拉面", "越南河粉", "螺蛳粉", "披萨", "寿司", "烤肉饭"];
            const choice = options[Math.floor(Math.random() * options.length)];
            const resultEl = document.getElementById('result');
            resultEl.innerText = `✨ ${choice}`;
            resultEl.classList.remove('placeholder');

            if (navigator.vibrate) {
                navigator.vibrate(10);
            }
        }
    </script>
</body>
</html>
