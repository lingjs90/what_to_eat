<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>今天吃什么 · 摇一摇</title>
    <style>
        /* 保持原样式不变 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 6px 12px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
            padding: 40px 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #1d1c1f;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .subhead {
            font-size: 1.1rem;
            color: #6e6d73;
            margin-bottom: 40px;
            font-weight: 400;
        }

        button {
            background: #007aff;
            border: none;
            color: white;
            font-size: 1.4rem;
            font-weight: 500;
            padding: 16px 32px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0, 122, 255, 0.3);
            transition: all 0.2s ease;
            width: 100%;
            max-width: 280px;
            margin: 0 auto 30px;
            display: block;
            outline: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        button:hover {
            background: #005fc7;
            transform: scale(1.02);
            box-shadow: 0 12px 24px rgba(0, 122, 255, 0.4);
        }

        button:active {
            transform: scale(0.98);
            background: #004999;
            box-shadow: 0 4px 8px rgba(0, 122, 255, 0.3);
        }

        .result-box {
            background: white;
            border-radius: 24px;
            padding: 30px 20px;
            margin-top: 20px;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02), 0 4px 12px rgba(0, 0, 0, 0.05);
            border: 1px solid #f0f0f3;
        }

        #result {
            font-size: 2.4rem;
            font-weight: 600;
            color: #1d1c1f;
            line-height: 1.3;
            word-break: break-word;
        }

        .placeholder {
            color: #a1a0a5;
            font-size: 1.8rem;
            font-weight: 400;
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #8e8e93;
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 2.4rem;
            }
            #result {
                font-size: 2rem;
            }
            button {
                font-size: 1.2rem;
                padding: 14px 24px;
                max-width: 240px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>
            <span>🍱</span> 今天吃什么
        </h1>
        <div class="subhead">摇一摇，让手机帮你决定</div>

        <button id="shakeBtn">摇一摇 👆</button>

        <div class="result-box">
            <div id="result" class="placeholder">等待你的选择…</div>
        </div>

        <div class="footer-note">
            每次点击或摇动手机随机推荐一种美食（不会连续重复）
        </div>
    </div>

    <script>
        (function() {
            // ---------- 美食列表 ----------
            const FOOD_OPTIONS = ["沙县小吃", "兰州拉面", "麦当劳", "煲仔饭", "麻辣烫", "肯德基", "日式拉面", "越南河粉", "螺蛳粉", "披萨", "寿司", "烤肉饭"];
            let lastFood = null; // 上一次选择的美食

            // ---------- 随机选择美食（保证不与上一次重复）----------
            function pickFood() {
                let newChoice;
                // 如果列表只有一项，直接选它
                if (FOOD_OPTIONS.length === 1) {
                    newChoice = FOOD_OPTIONS[0];
                } else {
                    // 循环直到与上一次不同
                    do {
                        newChoice = FOOD_OPTIONS[Math.floor(Math.random() * FOOD_OPTIONS.length)];
                    } while (newChoice === lastFood);
                }
                lastFood = newChoice; // 更新记忆

                const resultEl = document.getElementById('result');
                resultEl.innerText = `✨ ${newChoice}`;
                resultEl.classList.remove('placeholder');
            }

            // ---------- 摇一摇检测 ----------
            let lastX, lastY, lastZ;
            let lastShakeTime = 0;
            const SHAKE_THRESHOLD = 18;
            const MIN_SHAKE_INTERVAL = 1000;
            let shakeListenerActive = false;

            function handleDeviceMotion(event) {
                let accel = event.acceleration || event.accelerationIncludingGravity;
                if (!accel) return;
                let { x, y, z } = accel;
                if (x === null || y === null || z === null) return;

                let currentTime = Date.now();
                if (lastX === undefined) {
                    lastX = x; lastY = y; lastZ = z;
                    return;
                }

                let delta = Math.abs(x - lastX) + Math.abs(y - lastY) + Math.abs(z - lastZ);
                if (delta > SHAKE_THRESHOLD && (currentTime - lastShakeTime) > MIN_SHAKE_INTERVAL) {
                    pickFood();
                    lastShakeTime = currentTime;
                }

                lastX = x; lastY = y; lastZ = z;
            }

            function enableShakeDetection() {
                if (shakeListenerActive) return;
                window.addEventListener('devicemotion', handleDeviceMotion);
                shakeListenerActive = true;
                console.log('摇动监听已启用');
            }

            // ---------- iOS权限请求 ----------
            async function requestIosPermission() {
                if (!window.DeviceMotionEvent || typeof DeviceMotionEvent.requestPermission !== 'function') {
                    return true; // 非iOS设备
                }
                try {
                    const permissionState = await DeviceMotionEvent.requestPermission();
                    return permissionState === 'granted';
                } catch (err) {
                    console.warn('设备运动权限请求失败:', err);
                    return false;
                }
            }

            let iosPermissionRequested = false;

            async function requestIosPermissionAndEnable() {
                if (iosPermissionRequested) return false;
                iosPermissionRequested = true;
                const granted = await requestIosPermission();
                if (granted) {
                    enableShakeDetection();
                } else {
                    alert('需要设备运动权限才能使用摇一摇功能');
                }
                return granted;
            }

            const isIOS = window.DeviceMotionEvent && typeof DeviceMotionEvent.requestPermission === 'function';

            // ---------- 初始化 ----------
            function init() {
                if (!isIOS) {
                    enableShakeDetection(); // 非iOS直接启用监听
                } else {
                    // iOS：首次任意点击请求权限
                    document.addEventListener('click', function onClickAnywhere() {
                        document.removeEventListener('click', onClickAnywhere);
                        requestIosPermissionAndEnable();
                    }, { once: true });
                }
            }

            // ---------- 按钮点击处理 ----------
            const btn = document.getElementById('shakeBtn');
            if (btn) {
                btn.removeAttribute('onclick');
                btn.addEventListener('click', async function(e) {
                    pickFood(); // 立即随机美食（已防重复）

                    if (isIOS) {
                        if (!iosPermissionRequested) {
                            await requestIosPermissionAndEnable();
                        }
                    } else {
                        enableShakeDetection();
                    }
                });
            }

            init();
        })();
    </script>
</body>
</html>
